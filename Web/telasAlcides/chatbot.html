<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Suporte</title>
    <link rel="stylesheet" href="chatbot.css">
</head>

<body>

    
    <div class="chatbot-icon" id="chatbotIcon">
        <img src="robo.png" alt="chatbot" class="chatbot-img">
    </div>

    
    <div class="chatbox" id="chatBox">
        <div class="chat-header">
            <img src="robo.png" alt="bot" class="bot-icon">
            <span>Chat suporte</span>
        </div>

        <div class="chat-body">
            <div class="chat-message">Onde estão os meus PI’s?</div>
            <div class="chat-message">Como Usar o Fórum?</div>
            <div class="chat-message">Onde eu Vejo o meu repositório?</div>
            <div class="chat-message">Como ver os outros PI’s?</div>
            <div class="chat-message">Como ver os eventos?</div>
            <div class="chat-message">Como achar os meus certificados?</div>
        </div>

        <div class="chat-footer">
            <input type="text" id="userInput" placeholder="Digite sua mensagem...">
            <button id="sendBtn">
                <img src="enviar.png" alt="Enviar" class="send-icon">
            </button>
        </div>
    </div>


    <script src="chatbot.js"></script>
</body>

</html>
