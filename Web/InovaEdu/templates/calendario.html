{% extends "base.html" %}
{% load static %}

{% block content %}

    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'styles/calendario.css' %}">
        <title>Document</title>
    </head>

    {% block header %}
        {% include "partials/header.html" %}
    {% endblock %}

    <div class="calendar">
        <header>
        <select id="month-select"></select>
        <select id="year-select"></select>
        </header>
        <div class="weekdays">
        <div>Dom</div><div>Seg</div><div>Ter</div><div>Qua</div><div>Qui</div><div>Sex</div><div>Sáb</div>
        </div>
        <div class="days" id="days"></div>
    </div>

    <div id="eventModal" class="modal-overlay" style="display:none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2>Informações do Evento</h2>
            <p><strong>Nome:</strong> <span id="modal-nome"></span></p>
            <p><strong>Data:</strong> <span id="modal-date"></span></p>
        </div>
    </div>

    <script>
        const eventos = JSON.parse('{{ eventos_json|safe }}');
    </script>
    <script src="{% static 'scripts/calendario.js' %}"></script>

{% endblock %}
