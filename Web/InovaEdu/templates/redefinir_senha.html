{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{% static 'styles/codigoEmail.css' %}">
    <title>Inova Edu - Nova Senha</title>
</head>
<body>
    <form class="card_login" method="POST">
        {% csrf_token %}
        <h1>Crie uma nova senha</h1>
        
        {% if erro %}
            <p style="color:red; margin-bottom:10px;">{{ erro }}</p>
        {% endif %}

        <input type="password" name="nova_senha" placeholder="Nova Senha" required>
        <input type="password" name="confirmar_senha" placeholder="Confirme a Senha" required style="margin-top: 10px;">

        <button type="submit" style="margin-top: 15px;">Atualizar Senha</button>
    </form>
</body>
</html>
