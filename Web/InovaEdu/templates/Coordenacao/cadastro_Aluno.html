{% extends "base.html" %}
{% load static %}

{% block content %}
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'styles/cadastro_Aluno.css' %}?=V1">
    </head>

    {% comment %} {% block header %}
        {% include "partials/header.html" %}
    {% endblock %} {% endcomment %}
    
    <div class="titulo_usuario">
        <p>Cadastro Usuário</p>
    </div>
    
    

    <form action="{% url 'enviar' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
    
        <label for="nome">Primeiro Nome:</label>
        <input type="text" id="nome" name="nome" required placeholder="Digite seu nome">
    
        <label for="Sobrenome">Sobrenome:</label>
        <input type="text" id="Sobrenome" name="Sobrenome" required placeholder="Digite seu sobrenome">
    
        <label for="Email">Email:</label>
        <input type="email" id="Email" name="Email" required placeholder="exemplo@gmail.com">
    
        <label for="Senha">Senha:</label>
        <input type="password" id="Senha" name="Senha" required placeholder="***********">
    
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="4" placeholder="Lorem ipsum dolor sit amet...."></textarea>

        <label for="imagem">Imagem:</label>
        <input type="file" id="imagem" name="imagem" accept="image/*">

        <label for="tipoCadastro">Escolha sua opção de cadastro:</label>
        <select id="tipoCadastro" name="tipoCadastro" required>
            <option value="" disabled selected>Selecione uma opção</option>
            <option value="professor">Professor</option>
            <option value="aluno">Aluno</option>
            <option value="coordenacao">Coordenação</option>
        </select>


       
        <button type="submit">Salvar</button>
        <button type="button" onclick="window.location.href='{% url 'lista_usuario' %}'">Listar</button>
        <button type="button" onclick="window.history.back()">Voltar</button>

    </form>




{% endblock %}
