{% extends "base.html" %}
{% load static %}

{% block content %}

{% block header %}
{% include "partials/header.html" %}
{% endblock %}

<div class="titulo">
    <p>Repositórios</p>
</div>
<div class="aba_pesquisa">
    <img class="filtro_icone" src="{% static 'img/famicons_filter.svg' %}" alt="filtro" />
    <input class="pesquisa" type="search" placeholder="Pesquisar" />
    <button class="buscar" type="submit">
        <img class="pesquisar_icone" src="{% static 'img/Search.svg' %}" alt="pesquisar icone" />
        <p>Buscar</p>
    </button>
</div>
<main class="blocos">
    {% for Curso in curso %}
        <section>
            <img class="imagem_curso" src="{% static 'img/tecnologia.png' %}" alt="Imagem do curso" />
            <p>{{ Curso.nome_curso }}</p>
            <button>Entrar</button>
        </section>
    {% endfor %}
</main>
{% endblock %}
