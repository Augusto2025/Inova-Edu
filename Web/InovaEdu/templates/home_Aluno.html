{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'styles/home_Aluno.css' %}">
    <link rel="icon" href="{% static 'img/Ellipse 13.svg' %}" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Kadwa&display=swap" rel="stylesheet">
    <title>Inova Edu</title>
</head>
<body>
    <header>
        <img class="logo" src="{% static 'img/Ellipse 13.svg' %}" alt="Logo Inova Edu">
        <p class="texto_InovaEdu">Inova Edu</p>
    </header>
    <nav>
        <a href="">Forum</a>
        <a href="">Suporte</a>
        <a href="">Chat</a>
        <a href="">Eventos</a>
        <a href="">Perfil</a>
    </nav>
    <div class="titulo">
        <p>Repositórios</p>
    </div>
    <div class="aba_pesquisa">
        <img class="filtro_icone" src="{% static 'img/famicons_filter.svg' %}" alt="filtro">
        <input class="pesquisa" type="search" placeholder="Pesquisar">
        <button class="buscar" type="submit">
            <img class="pesquisar_icone" src="{% static 'img/Search.svg' %}" alt="pesquisar icone">
            <p>Buscar</p>
        </button>
    </div>
    <main class="blocos">
        {% for nomes in Curso_test %}
            <section>
                <img class="imagem_curso" src="{% static 'img/tecnologia.png' %}" alt="Imagem do curso">
                <p>{{ nomes.nome_curso }}</p>
                <button>Entrar</button>
            </section>
        {% endfor %}
    </main>
</body>
</html>
