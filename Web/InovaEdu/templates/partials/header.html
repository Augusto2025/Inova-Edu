{% load static %}

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=menu,menu_open" />

<header>
    <div class="logo_e_texto">
        <!-- <img class="logo" src="{% static 'img/Logo Laranja.svg' %}" alt="Logo Inova Edu Laranja"> -->
        <a href="{% url "home" %}">
            <p class="texto_InovaEdu">Inova Edu</p>
        </a>
    </div>
    <div style="display: flex; align-items: center; color: white;">
        <p class="Nome_Usu">Olá, {{ usuario.nome }}</p>
        <span id="menu" class="material-symbols-outlined" style="color: white; margin-left: 10px; font-size: 30px; cursor: pointer;">menu</span>
        <span id="menu-open" class="material-symbols-outlined" style="color: white; margin-left: 10px; font-size: 30px; cursor: pointer; display: none;">menu_open</span>
    </div>
</header>
<nav id="site-nav">
    <a href="{% url "forum_blocos" %}">Forum</a>
    <a href="{% url "calendario" %}">Eventos</a>
    <a href="{% url "perfil" %}">Perfil</a>
    <a class="sair" href="{% url "login" %}">Sair</a>
</nav>

<script>
    (function() {
        const btnMenu = document.getElementById('menu');        // ícone normal
        const btnMenuOpen = document.getElementById('menu-open'); // ícone aberto
        const nav = document.getElementById('site-nav');

        function toggleNav() {
            const isOpen = nav.classList.toggle('open');

            // troca ícones
            if (isOpen) {
                btnMenu.style.display = "none";
                btnMenuOpen.style.display = "inline-block";
            } else {
                btnMenu.style.display = "inline-block";
                btnMenuOpen.style.display = "none";
            }
        }

        // eventos nos dois ícones
        btnMenu.addEventListener('click', toggleNav);
        btnMenuOpen.addEventListener('click', toggleNav);
    })();
</script>
