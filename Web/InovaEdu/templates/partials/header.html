{% load static %}

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=logout" />

<header>
    <!-- canvas de fundo para estrelas cadentes (permanece no topo do header) -->
    <canvas id="header-stars" aria-hidden="true"></canvas>

    <div class="logo_e_texto">
        <!-- botão hamburger no início (garante que o script antigo funcione) -->
        <button id="menuToggle" class="hamburger" aria-label="Abrir menu" aria-expanded="false">
          <span class="bar" aria-hidden="true"></span>
        </button>
        
        <!-- <img class="logo" src="{% static 'img/Logo Laranja.svg' %}" alt="Logo Inova Edu Laranja"> -->
        <a href="{% url "home" %}">
          <img src="{% static 'img/LOGO_BRANCO.png' %}" alt="" style="width: 150px;">
            {% comment %} <p class="texto_InovaEdu">Inova Edu</p> {% endcomment %}
        </a>
    </div>

    <!-- nav e ações do usuário permanecem -->
    <nav id="site-nav" class="Paginas">
        <a href="{% url "home" %}">Cursos</a>
        <a href="{% url "forum_blocos" %}">Forum</a>
        <a href="{% url "calendario" %}">Eventos</a>
        <a href="{% url "perfil" %}">Perfil</a>
    </nav>

    <div style="display: flex; align-items: center; color: white;">
        <a href="{% url "perfil" %}">
            <p class="Nome_Usu">Olá, {{ usuario.nome }}</p>
        </a>
        <a class="sair" href="{% url "login" %}">
            <span class="material-symbols-outlined">logout</span>
        </a>
    </div>
</header>

<!-- script antigo do menu (mantido) -->
<script>
document.addEventListener('DOMContentLoaded', function () {
  const btn = document.getElementById('menuToggle');
  const headerEl = document.querySelector('header');
  if (!btn || !headerEl) return;
  btn.addEventListener('click', function () {
    const opened = headerEl.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', opened ? 'true' : 'false');
  });
  // fechar menu ao redimensionar para desktop
  window.addEventListener('resize', function () {
    if (window.innerWidth > 768) {
      headerEl.classList.remove('nav-open');
      btn.setAttribute('aria-expanded', 'false');
    }
  });
});
</script>

<!-- script das estrelas cadentes (acrescentado logo abaixo do script antigo) -->
<script>
(function () {
  const canvas = document.getElementById('header-stars');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  let stars = [];
  const STAR_COUNT = 18;

  function resize() {
    const headerEl = document.querySelector('header');
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.max(300, headerEl.offsetWidth) * dpr;
    canvas.height = headerEl.offsetHeight * dpr;
    canvas.style.width = '100%';
    canvas.style.height = headerEl.offsetHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function initStars() {
    stars = [];
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * w,
        y: Math.random() * (h * 0.8) - h,
        len: 60 + Math.random() * 120,
        speed: 1 + Math.random() * 3.2,
        alpha: 0.4 + Math.random() * 0.9,
        thickness: 1 + Math.random() * 1.2,
        angle: Math.PI * 0.75 + (Math.random() - 0.5) * 0.2
      });
    }
  }

  function tick() {
    const w = canvas.width / (window.devicePixelRatio || 1);
    const h = canvas.height / (window.devicePixelRatio || 1);
    ctx.clearRect(0, 0, w, h);

    for (let s of stars) {
      const vx = Math.cos(s.angle) * s.speed * 3;
      const vy = Math.sin(s.angle) * s.speed * 3;

      ctx.beginPath();
      ctx.strokeStyle = 'rgba(255,255,255,' + (s.alpha * 0.9) + ')';
      ctx.lineWidth = s.thickness;
      ctx.moveTo(s.x, s.y);
      ctx.lineTo(s.x - vx * s.len * 0.06, s.y - vy * s.len * 0.06);
      ctx.stroke();

      ctx.beginPath();
      ctx.fillStyle = 'rgba(255,255,255,' + s.alpha + ')';
      ctx.arc(s.x, s.y, Math.max(0.8, s.thickness * 1.2), 0, Math.PI * 2);
      ctx.fill();

      s.x += vx;
      s.y += vy;

      if (s.x < -50 || s.x > w + 50 || s.y > h + 50) {
        s.x = Math.random() * w;
        s.y = -10 - Math.random() * h * 0.6;
        s.len = 60 + Math.random() * 120;
        s.speed = 1 + Math.random() * 3.2;
        s.alpha = 0.4 + Math.random() * 0.9;
        s.thickness = 1 + Math.random() * 1.2;
      }
    }
    requestAnimationFrame(tick);
  }

  function start() {
    resize();
    initStars();
    requestAnimationFrame(tick);
  }

  window.addEventListener('resize', function () {
    resize();
    initStars();
  });

  document.addEventListener('readystatechange', function () {
    if (document.readyState === 'complete' || document.readyState === 'interactive') start();
  });
})();
</script>
