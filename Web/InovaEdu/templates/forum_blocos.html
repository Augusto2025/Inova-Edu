{% extends "base.html" %}
{% load static %}

{% block content %}
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'styles/forum_blocos.css' %}">
    </head>

    {% block header %}
        {% include "partials/header.html" %}
    {% endblock %}

    <div class="titulo">
        <p>Todos os Foruns</p>
        <img class="filtro_icone" src="{% static 'img/famicons_filter.svg' %}" alt="filtro" />
    </div>
    <input class="pesquisa" type="search" placeholder="Pesquisar" />
    <main>
        {% for Forum in Foruns  %}
            <section>
                <p>{{ Forum.nome }}</p>
                <div class="borda"></div>
                <div class="data_criacao">
                    <p>Data de Criação:</p>
                    <p>{{ Forum.data_criacao }}</p>
                </div>
                <a class="Botao_entrar_forum" href="{% url 'forum' Forum.idforum %}">Entrar</a>
            </section>
        {% endfor %}
    </main>

{% endblock %}
