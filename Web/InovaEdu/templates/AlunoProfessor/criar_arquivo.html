{% extends "base.html" %}

{% block content %}
<h2>Criar Novo Arquivo</h2>

<form method="POST" enctype="multipart/form-data">
    {% csrf_token %}
    <label for="nome_projeto">Nome do Arquivo:</label>
    <input type="text" id="nome_projeto" name="nome_projeto" required>
    
    <label for="arquivo">Escolha o Arquivo:</label>
    <input type="file" id="arquivo" name="arquivo" required>
    
    <button type="submit">Criar Arquivo</button>
</form>

{% endblock %}
