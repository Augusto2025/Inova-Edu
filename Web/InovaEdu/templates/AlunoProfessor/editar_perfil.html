{% extends "base.html" %}
{% load static %}

{% block content %}
<link rel="stylesheet" href="{% static 'styles/editar_perfil.css' %}">

{% include "partials/header.html" %}

<div class="titulo">
    <p>Editar Perfil</p>
</div>

<main>
    <form method="POST" enctype="multipart/form-data" class="editar-form">
        {% csrf_token %}

        <div class="foto-area">
            {% if usuario.imagem %}
                <img class="perfil-img" src="{{ usuario.imagem.url }}" alt="Foto do usuário">
            {% else %}
                <img class="perfil-img" src="{% static 'img/default_user.png' %}" alt="Foto do usuário">
            {% endif %}

            <label for="imagem" class="alterar-foto">Alterar Foto</label>
            <input type="file" id="imagem" name="imagem" accept="image/*">
        </div>

        <div class="inputs">
            <div class="campo">
                <label>Nome</label>
                <input type="text" name="nome" value="{{ usuario.nome }}">
            </div>

            <div class="campo">
                <label>Sobrenome</label>
                <input type="text" name="sobrenome" value="{{ usuario.sobrenome }}">
            </div>

            <div class="campo">
                <label>Email</label>
                <input type="email" name="email" value="{{ usuario.email }}">
            </div>

            <div class="campo">
                <label>Nova senha:</label>
                <input type="password" name="senha" placeholder="Deixe em branco para manter a senha atual">
            </div>


            <div class="campo">
                <label>Descrição</label>
                <textarea name="descricao">{{ usuario.descricao }}</textarea>
            </div>

            <div class="campo">
                <label>Link da rede social</label>
                <input type="url" id="redeSocialInput" placeholder="Cole aqui qualquer link" maxlength="45">
            </div>

            <button type="button" class="salvar" onclick="salvarRedeSocial()">Adicionar Link</button>

            <div class="campo">
                <label>Links adicionados</label>
                <ul id="lista-redes-editar" style="list-style-type: none; padding-left: 0;"></ul>
            </div>
            <style>
                .btn-remover {
                    background-color: red;
                    color: white;
                    border: none;
                    border-radius: 50%;
                    width: 20px;
                    height: 20px;
                    cursor: pointer;
                    margin-left: 10px;
                }
            </style>
        </div>

        <div class="botoes">
            <a href="{% url 'perfil' %}" class="cancelar">Cancelar</a>
            <button type="submit" class="salvar">Salvar Alterações</button>
        </div>

    </form>
</main>

<script>
    function carregarLinksEditar() {
        let lista = document.getElementById("lista-redes-editar");
        lista.innerHTML = "";

        let links = JSON.parse(localStorage.getItem("links_redes")) || [];

        if (links.length === 0) {
            lista.innerHTML = "<li>Nenhum link cadastrado.</li>";
            return;
        }

        links.forEach((link, index) => {
            let li = document.createElement("li");
            li.innerHTML = `
                <span>${link}</span>
                <button class="btn-remover" onclick="removerLink(${index})">X</button>
            `;
            lista.appendChild(li);
        });
    }

    function salvarRedeSocial() {
        const link = document.getElementById("redeSocialInput").value;

        if (!link) {
            alert("Insira um link.");
            return;
        }

        let links = JSON.parse(localStorage.getItem("links_redes")) || [];
        links.push(link);

        localStorage.setItem("links_redes", JSON.stringify(links));

        document.getElementById("redeSocialInput").value = "";
        carregarLinksEditar();

        alert("Link adicionado!");
    }

    function removerLink(index) {
        let links = JSON.parse(localStorage.getItem("links_redes")) || [];

        links.splice(index, 1);

        localStorage.setItem("links_redes", JSON.stringify(links));

        carregarLinksEditar();
        alert("Link removido!");
    }

    document.addEventListener("DOMContentLoaded", carregarLinksEditar);
</script>

{% include "partials/footer.html" %}
{% endblock %}
