{% extends "base.html" %}
{% load static %}

{% block content %}
    <!DOCTYPE html>
    <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{% static 'styles/cadastro_Aluno.css' %}?=V1">
    </head>

    {% block header %}
        {% include "partials/header.html" %}
    {% endblock %}
    
    <div class="titulo_usuario">
        <p>Cadastro Usuário</p>
    </div>
    
    
    
    <div class="opcoes">
        <p>Escolha abaixo sua opção de cadastro:</p>
        <label>
            <input type="radio" name="tipoCadastro" value="professor">
            Professor
        </label>
        <label>
            <input type="radio" name="tipoCadastro" value="aluno">
            Aluno
        </label>
        <label>
            <input type="radio" name="tipoCadastro" value="coordenacao">
            Coordenação
        </label>
    </div>
    
    
    <form action="/enviar" method="POST">
        {% csrf_token %}
    
        <label for="nome">Primeiro Nome:</label>
        <input type="text" id="nome" name="nome" required>
    
        <label for="Sobrenome">Sobrenome:</label>
        <input type="text" id="Sobrenome" name="Sobrenome" required>
    
        {% comment %} <label for="imagem">Imagem:</label>
        <input type="file" id="imagem" name="imagem" accept="image/*"> {% endcomment %}
    
    
        <label for="Email">Email:</label>
        <input type="email" id="Email" name="Email" required>
    
        <label for="Senha">Senha:</label>
        <input type="password" id="Senha" name="Senha" required>
    
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="4"></textarea>
    
        <button type="submit">Salvar</button>
        <button type="button" onclick="window.history.back()">Voltar</button>
    </form>
{% endblock %}
