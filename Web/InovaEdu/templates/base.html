{% load static %}

<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="{% static 'img/Ellipse 13.svg' %}"
      type="image/png"
    />
    <!-- Colocar se o usuário for Aluno usar LARANJA se for Professor ou Coordenador usar AZUL -->
    {% if usuario.tipo|lower == "aluno" %}
        <link rel="stylesheet" href="{% static 'styles/header_Laranja.css' %}">
    {% else %}
        <link rel="stylesheet" href="{% static 'styles/header_Azul.css' %}">
    {% endif %}
    <title>Inova Edu</title>
  </head>
  <body>
    {% block content %} {% block header %}{% endblock %} {% endblock %}
  </body>
</html>
